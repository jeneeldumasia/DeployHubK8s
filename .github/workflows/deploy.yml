name: CI/CD — Build, Scan & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target (k3s or eks)"
        required: true
        default: "k3s"
        type: choice
        options: [k3s, eks]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ""  # resolved dynamically from AWS credentials
  BACKEND_IMAGE: deployhub-backend
  FRONTEND_IMAGE: deployhub-frontend

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build & push images to ECR
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
      ecr-registry: ${{ steps.resolve.outputs.ecr_registry }}
      account-id: ${{ steps.resolve.outputs.account_id }}

    steps:
      - uses: actions/checkout@v5

      - name: Generate image tag
        id: tag
        run: echo "tag=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve account + ECR registry
        id: resolve
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "ecr_registry=${REGISTRY}" >> $GITHUB_OUTPUT
          echo "ECR_REGISTRY=${REGISTRY}" >> $GITHUB_ENV

      - name: Ensure ECR repositories exist
        run: |
          for repo in $BACKEND_IMAGE $FRONTEND_IMAGE deployhub-apps; do
            aws ecr describe-repositories --repository-names $repo --region $AWS_REGION 2>/dev/null || \
              aws ecr create-repository --repository-name $repo --region $AWS_REGION
          done

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend
        run: |
          docker build \
            --tag $ECR_REGISTRY/$BACKEND_IMAGE:${{ steps.tag.outputs.tag }} \
            --tag $ECR_REGISTRY/$BACKEND_IMAGE:latest \
            ./backend

      - name: Scan backend (Trivy)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.69.3
          trivy image \
            --format table \
            --exit-code 0 \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            $ECR_REGISTRY/$BACKEND_IMAGE:${{ steps.tag.outputs.tag }}

      - name: Push backend
        if: github.ref == 'refs/heads/main'
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:${{ steps.tag.outputs.tag }}
          docker push $ECR_REGISTRY/$BACKEND_IMAGE:latest

      - name: Build frontend
        run: |
          docker build \
            --tag $ECR_REGISTRY/$FRONTEND_IMAGE:${{ steps.tag.outputs.tag }} \
            --tag $ECR_REGISTRY/$FRONTEND_IMAGE:latest \
            ./frontend

      - name: Scan frontend (Trivy)
        run: |
          trivy image \
            --format table \
            --exit-code 0 \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            $ECR_REGISTRY/$FRONTEND_IMAGE:${{ steps.tag.outputs.tag }}

      - name: Push frontend
        if: github.ref == 'refs/heads/main'
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:${{ steps.tag.outputs.tag }}
          docker push $ECR_REGISTRY/$FRONTEND_IMAGE:latest

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2a — Deploy to k3s on EC2 (default for push to main)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-k3s:
    name: Deploy to k3s (EC2)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event.inputs.environment == 'k3s' || github.event.inputs.environment == '')
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.8.5"
          terraform_wrapper: false

      - name: Bootstrap Terraform remote state
        run: |
          aws s3api create-bucket \
            --bucket deployhub-tfstate \
            --region $AWS_REGION 2>/dev/null || true

          aws s3api put-bucket-versioning \
            --bucket deployhub-tfstate \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket deployhub-tfstate \
            --server-side-encryption-configuration \
            '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket deployhub-tfstate \
            --public-access-block-configuration \
            "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

          # Create DynamoDB lock table if it doesn't exist, then wait until ACTIVE
          aws dynamodb create-table \
            --table-name deployhub-tfstate-lock \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region $AWS_REGION 2>/dev/null || true

          aws dynamodb wait table-exists \
            --table-name deployhub-tfstate-lock \
            --region $AWS_REGION

      - name: Generate ephemeral SSH key pair
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/deployhub -N "" -C "deployhub-ci"
          chmod 600 ~/.ssh/deployhub

      - name: Provision k3s EC2 with Terraform
        id: tf
        working-directory: terraform/environments/k3s
        run: |
          # Account-scoped state key — each AWS account gets its own clean state
          terraform init -input=false \
            -backend-config="key=environments/k3s/${{ needs.build-and-push.outputs.account-id }}/terraform.tfstate"

          terraform apply -auto-approve -input=false

          echo "ec2_ip=$(terraform output -raw ec2_public_ip)"             >> $GITHUB_OUTPUT
          echo "instance_id=$(terraform output -raw ec2_instance_id)"      >> $GITHUB_OUTPUT
          echo "apps_ecr=$(terraform output -raw ecr_apps_repository_url)" >> $GITHUB_OUTPUT

      - name: Push ephemeral public key via EC2 Instance Connect
        run: |
          # EC2 Instance Connect pushes the public key to the instance for 60 seconds —
          # no pre-provisioned key pair needed, works on any instance in any account
          aws ec2-instance-connect send-ssh-public-key \
            --region $AWS_REGION \
            --instance-id ${{ steps.tf.outputs.instance_id }} \
            --instance-os-user ubuntu \
            --ssh-public-key file://~/.ssh/deployhub.pub

      - name: Configure SSH known hosts
        run: |
          ssh-keyscan -H ${{ steps.tf.outputs.ec2_ip }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Prepare k8s manifests
        env:
          EC2_IP: ${{ steps.tf.outputs.ec2_ip }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr-registry }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          REPLACE_ME_GRAFANA_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          REPLACE_ME_GRAFANA_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          REPLACE_ME_MONGO_URI: "mongodb://mongo:27017/deployhub"
          REPLACE_ME_REGISTRY_ADDR: ${{ steps.tf.outputs.apps_ecr }}
          REPLACE_ME_PUBLIC_BASE_URL: "http://${{ steps.tf.outputs.ec2_ip }}:3081"
          BACKEND_SA_ROLE_ARN: ""
        run: |
          cp -r k8s_deploy/ k8s_rendered/
          sed -i "s|deployhub-backend:latest|$ECR_REGISTRY/$BACKEND_IMAGE:$IMAGE_TAG|g" k8s_rendered/backend.yaml
          sed -i "s|deployhub-frontend:latest|$ECR_REGISTRY/$FRONTEND_IMAGE:$IMAGE_TAG|g" k8s_rendered/frontend.yaml
          sed -i "s|http://3.95.33.38|http://$EC2_IP|g" k8s_rendered/backend.yaml
          sed -i 's|\${BACKEND_SA_ROLE_ARN}||g' k8s_rendered/backend.yaml
          envsubst < k8s_deploy/secrets.yaml > k8s_rendered/secrets.yaml

      - name: Wait for k3s to be ready on EC2
        run: |
          EC2_IP=${{ steps.tf.outputs.ec2_ip }}
          echo "Waiting for k3s to finish bootstrapping..."
          for i in $(seq 1 24); do
            if ssh -i ~/.ssh/deployhub -o StrictHostKeyChecking=no ubuntu@$EC2_IP \
              "kubectl get nodes 2>/dev/null | grep -q Ready"; then
              echo "✅ k3s is ready"
              break
            fi
            echo "Attempt $i/24 — k3s not ready yet, waiting 10s..."
            sleep 10
          done

      - name: Deploy to EC2
        env:
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr-registry }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          ssh -i ~/.ssh/deployhub ubuntu@${{ steps.tf.outputs.ec2_ip }} "mkdir -p /home/ubuntu/k8s_deploy"
          scp -i ~/.ssh/deployhub -r k8s_rendered/. ubuntu@${{ steps.tf.outputs.ec2_ip }}:/home/ubuntu/k8s_deploy/
          ssh -i ~/.ssh/deployhub ubuntu@${{ steps.tf.outputs.ec2_ip }} << EOF
            set -e

            # Create ECR image pull secret using the instance IAM role
            ECR_PASSWORD=\$(aws ecr get-login-password --region $AWS_REGION)
            kubectl create namespace deployhub --dry-run=client -o yaml | kubectl apply -f -
            kubectl create secret docker-registry ecr-private-key \
              --namespace deployhub \
              --docker-server=$ECR_REGISTRY \
              --docker-username=AWS \
              --docker-password="\$ECR_PASSWORD" \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl apply -f /home/ubuntu/k8s_deploy/namespace.yaml
            kubectl apply -f /home/ubuntu/k8s_deploy/
            kubectl rollout status deployment/backend  -n deployhub --timeout=300s || {
              echo "=== backend pod describe ==="
              kubectl describe pod -n deployhub -l app=backend
              echo "=== backend pod logs ==="
              kubectl logs -n deployhub -l app=backend --tail=50 || true
              exit 1
            }
            kubectl rollout status deployment/frontend -n deployhub --timeout=120s
          EOF

      - name: Smoke test
        run: |
          EC2_IP=${{ steps.tf.outputs.ec2_ip }}
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$EC2_IP:3081/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i/15 — HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          EC2_IP=${{ steps.tf.outputs.ec2_ip }}
          echo "### k3s Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image tag** | \`${{ needs.build-and-push.outputs.image-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **UI** | http://$EC2_IP:3080 |" >> $GITHUB_STEP_SUMMARY
          echo "| **API** | http://$EC2_IP:3081 |" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2b — Deploy to EKS (manual trigger only — requires full IAM permissions)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      github.ref == 'refs/heads/main' &&
      github.event.inputs.environment == 'eks'
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.8.5"
          terraform_wrapper: false

      - name: Bootstrap Terraform remote state
        run: |
          aws s3api create-bucket \
            --bucket deployhub-tfstate \
            --region $AWS_REGION 2>/dev/null || true

          aws s3api put-bucket-versioning \
            --bucket deployhub-tfstate \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket deployhub-tfstate \
            --server-side-encryption-configuration \
            '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket deployhub-tfstate \
            --public-access-block-configuration \
            "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

          aws dynamodb create-table \
            --table-name deployhub-tfstate-lock \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region $AWS_REGION 2>/dev/null || true

          aws dynamodb wait table-exists \
            --table-name deployhub-tfstate-lock \
            --region $AWS_REGION

      - name: Provision infrastructure with Terraform
        id: tf
        working-directory: terraform/environments/prod
        run: |
          terraform init -input=false \
            -backend-config="key=environments/prod/${{ needs.build-and-push.outputs.account-id }}/terraform.tfstate"

          if [ ! -f terraform.tfvars ]; then
            cp terraform.tfvars.example terraform.tfvars
            sed -i "s/CHANGE_ME_STRONG_PASSWORD/${{ secrets.GRAFANA_ADMIN_PASSWORD }}/" terraform.tfvars
          fi

          # Import existing ECR repos so Terraform doesn't try to recreate them
          terraform import 'module.ecr.aws_ecr_repository.repos["deployhub-backend"]'  deployhub-backend  2>/dev/null || true
          terraform import 'module.ecr.aws_ecr_repository.repos["deployhub-frontend"]' deployhub-frontend 2>/dev/null || true
          terraform import 'module.ecr.aws_ecr_repository.repos["deployhub-apps"]'     deployhub-apps     2>/dev/null || true

          terraform apply -auto-approve -input=false

          echo "cluster_name=$(terraform output -raw eks_cluster_name)"       >> $GITHUB_OUTPUT
          echo "ecr_backend=$(terraform output -raw ecr_backend_url)"         >> $GITHUB_OUTPUT
          echo "ecr_frontend=$(terraform output -raw ecr_frontend_url)"       >> $GITHUB_OUTPUT
          echo "ecr_apps=$(terraform output -raw ecr_apps_url)"               >> $GITHUB_OUTPUT
          echo "alb_dns=$(terraform output -raw alb_dns_name)"                >> $GITHUB_OUTPUT
          echo "backend_sa_role=$(terraform output -raw backend_sa_role_arn)" >> $GITHUB_OUTPUT

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name ${{ steps.tf.outputs.cluster_name }}

      - name: Render k8s manifests
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          ECR_BACKEND: ${{ steps.tf.outputs.ecr_backend }}
          ECR_FRONTEND: ${{ steps.tf.outputs.ecr_frontend }}
          ECR_APPS: ${{ steps.tf.outputs.ecr_apps }}
          ALB_DNS: ${{ steps.tf.outputs.alb_dns }}
          BACKEND_SA_ROLE_ARN: ${{ steps.tf.outputs.backend_sa_role }}
          REPLACE_ME_GRAFANA_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          REPLACE_ME_GRAFANA_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          REPLACE_ME_MONGO_URI: "mongodb://mongo:27017/deployhub"
          REPLACE_ME_REGISTRY_ADDR: ${{ steps.tf.outputs.ecr_apps }}
          REPLACE_ME_PUBLIC_BASE_URL: "http://${{ steps.tf.outputs.alb_dns }}"
        run: |
          cp -r k8s_deploy/ k8s_rendered/
          sed -i "s|deployhub-backend:latest|$ECR_BACKEND:$IMAGE_TAG|g" k8s_rendered/backend.yaml
          sed -i "s|deployhub-frontend:latest|$ECR_FRONTEND:$IMAGE_TAG|g" k8s_rendered/frontend.yaml
          sed -i "s|\${BACKEND_SA_ROLE_ARN}|$BACKEND_SA_ROLE_ARN|g" k8s_rendered/backend.yaml
          envsubst < k8s_deploy/secrets.yaml > k8s_rendered/secrets.yaml

      - name: Apply manifests to EKS
        run: |
          kubectl apply -f k8s_rendered/namespace.yaml
          kubectl apply -f k8s_rendered/secrets.yaml
          kubectl apply -f k8s_rendered/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend  -n deployhub --timeout=180s
          kubectl rollout status deployment/frontend -n deployhub --timeout=90s

      - name: Smoke test
        run: |
          ALB=${{ steps.tf.outputs.alb_dns }}
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$ALB/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i/12 — HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ Backend did not become healthy"
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          ALB=${{ steps.tf.outputs.alb_dns }}
          echo "### EKS Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image tag** | \`${{ needs.build-and-push.outputs.image-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **UI** | http://$ALB |" >> $GITHUB_STEP_SUMMARY
          echo "| **API** | http://$ALB/api |" >> $GITHUB_STEP_SUMMARY
          echo "| **Grafana** | http://$ALB/grafana |" >> $GITHUB_STEP_SUMMARY
