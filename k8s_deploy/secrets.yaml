# ── HOW THIS FILE WORKS ───────────────────────────────────────────────────────
#
# This file is a TEMPLATE. The placeholder values ($REPLACE_ME_*) must be
# substituted before applying. Two ways to do this:
#
#   1. Manual (local / KodeKloud playground):
#      Run the helper script:  ./scripts/apply-secrets.sh
#
#   2. Automated (GitHub Actions):
#      The deploy.yml workflow renders this file using envsubst before applying.
#
# NEVER commit real values here. This file is safe to commit as-is.
# ─────────────────────────────────────────────────────────────────────────────

# ── Grafana credentials ───────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: deployhub
type: Opaque
stringData:
  admin-user: "${REPLACE_ME_GRAFANA_USER}"
  admin-password: "${REPLACE_ME_GRAFANA_PASSWORD}"

# ── Backend runtime config ────────────────────────────────────────────────────
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: deployhub
type: Opaque
stringData:
  mongo-uri: "${REPLACE_ME_MONGO_URI}"
  registry-addr: "${REPLACE_ME_REGISTRY_ADDR}"

# ── Backend non-sensitive config (ConfigMap, not Secret) ──────────────────────
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: deployhub
data:
  public-base-url: "${REPLACE_ME_PUBLIC_BASE_URL}"
  aws-region: "us-east-1"
  deployment-mode: "k8s"
  mongo-db-name: "deployhub"
  buildkit-host: "tcp://buildkitd:1234"
  registry-insecure: "false"
