apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-data-pvc
  namespace: deployhub
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: deployhub
  annotations:
    # EKS: IRSA — pod assumes this IAM role for ECR push without static credentials
    # k3s: annotation is ignored, ECR access uses node IAM role or ecr-private-key secret
    eks.amazonaws.com/role-arn: "${BACKEND_SA_ROLE_ARN}"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-manager
  namespace: deployhub
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "pods/log", "pods/status"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-pod-manager
  namespace: deployhub
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: deployhub
roleRef:
  kind: Role
  name: pod-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: deployhub
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa
      imagePullSecrets:
        - name: ecr-private-key
      containers:
        - name: backend
          image: 654654525548.dkr.ecr.us-east-1.amazonaws.com/deployhub-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DEPLOYMENT_MODE
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: deployment-mode
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: mongo-uri
            - name: MONGO_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: mongo-db-name
            - name: BUILDKIT_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: buildkit-host
            - name: REGISTRY_ADDR
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: registry-addr
            - name: REGISTRY_INSECURE
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: registry-insecure
            - name: PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: public-base-url
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: aws-region
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          volumeMounts:
            - name: backend-data
              mountPath: /data
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: backend-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: deployhub
  annotations:
    # On k3s: NodePort is used directly
    # On EKS: ALB controller uses ClusterIP + pod IPs via target-type: ip
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 3081
  type: NodePort   # works on both k3s and EKS (ALB controller ignores type)
